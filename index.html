<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escalas DEJEM</title>
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">

        <header class="header">
            <div class="header-top">
                <div class="header-container">
                    <div class="header-gif-left">
                        <img id="gifLeft" src="./img/copom.png" alt="Decoracao esquerda" class="header-gif">
                    </div>

                    <div class="header-title-section">
                        <h1 class="header-main-title">ESCALAS DEJEM</h1>
                        <p class="header-subtitle">SELECIONE UMA DATA PARA VISUALIZAR AS ESCALAS DISPONÍVEIS</p>
                    </div>

                    <div class="header-gif-right">
                        <img id="gifRight" src="./img/copom.png" alt="Decoracao direita" class="header-gif">
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="main-container">

                <!-- BUSCA EXISTENTE -->
                <div class="search-bar-wrapper">
                    <div class="search-bar">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Buscar por ID da escala..."
                            autocomplete="off"
                        >
                        <button id="clearSearchBtn" class="search-clear-btn" title="Limpar busca">
                            X
                        </button>
                    </div>
                </div>

                <!-- NOVA BUSCA DIRETA -->
                <div class="search-bar-wrapper" style="margin-top:10px;">
                    <div class="search-bar">
                        <input 
                            type="text" 
                            id="buscaEscala" 
                            class="search-input" 
                            placeholder="Abrir qualquer escala pelo ID"
                            autocomplete="off"
                        >
                        <button onclick="buscarEscala()" class="btn btn-primary" style="max-width:170px;">
                            Abrir ID
                        </button>
                    </div>
                </div>

                <div class="grid">

                    <div class="calendar-section">
                        <div class="card">

                            <div class="calendar-header">
                                <div class="month-navigation">
                                    <h2 id="monthName" class="month-title">Carregando...</h2>

                                    <div class="nav-buttons">
                                        <button id="prevMonthBtn" class="nav-btn">◀</button>
                                        <button id="nextMonthBtn" class="nav-btn">▶</button>
                                    </div>
                                </div>

                                <div class="weekdays">
                                    <div class="weekday">Dom</div>
                                    <div class="weekday">Seg</div>
                                    <div class="weekday">Ter</div>
                                    <div class="weekday">Qua</div>
                                    <div class="weekday">Qui</div>
                                    <div class="weekday">Sex</div>
                                    <div class="weekday">Sab</div>
                                </div>
                            </div>

                            <div id="calendarGrid" class="calendar-grid"></div>

                            <div class="calendar-legend">
                                <div class="legend-item">
                                    <div class="legend-color selected"></div>
                                    <span>Data selecionada</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color available"></div>
                                    <span>Com escalas</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color unavailable"></div>
                                    <span>Sem escalas</span>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="scales-section">
                        <div id="scalesContainer"></div>
                    </div>

                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>© 2026 | Desenvolvido por <strong>Saulo Eleutério</strong></p>
            </div>
        </footer>

    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
