<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escalas DEJEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="header-container">
                    <!-- Left GIF Space -->
                    <div class="header-gif-left">
                        <img id="gifLeft" src="./img/copom.png" alt="Decoracao esquerda" class="header-gif">
                    </div>

                    <!-- Title -->
                    <div class="header-title-section">
                        <h1 class="header-main-title">SISTEMA DE ESCALAS</h1>
                        <p class="header-subtitle">DEJEM COPOM - Selecione uma data para visualizar as escalas disponíveis</p>
                    </div>

                    <!-- Right GIF Space -->
                    <div class="header-gif-right">
                        <img id="gifRight" src="./img/copom.png" alt="Decoracao direita" class="header-gif">
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="main-container">
                <!-- Search Bar (Top Full Width) -->
                <div class="search-bar-wrapper">
                    <div class="search-bar">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Buscar por ID da escala..."
                            autocomplete="off"
                        >
                        <button id="clearSearchBtn" class="search-clear-btn" title="Limpar busca">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="grid">
                    <!-- Calendar Section (Left, Smaller) -->
                    <div class="calendar-section">
                        <div class="card">
                            <div class="calendar-header">
                                <div class="month-navigation">
                                    <h2 id="monthName" class="month-title">Carregando...</h2>
                                    <div class="nav-buttons">
                                        <button id="prevMonthBtn" class="nav-btn" title="Mês anterior">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="15 18 9 12 15 6"></polyline>
                                            </svg>
                                        </button>
                                        <button id="nextMonthBtn" class="nav-btn" title="Próximo mês">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="9 18 15 12 9 6"></polyline>
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                <!-- Weekday Headers -->
                                <div class="weekdays">
                                    <div class="weekday">Dom</div>
                                    <div class="weekday">Seg</div>
                                    <div class="weekday">Ter</div>
                                    <div class="weekday">Qua</div>
                                    <div class="weekday">Qui</div>
                                    <div class="weekday">Sex</div>
                                    <div class="weekday">Sab</div>
                                </div>
                            </div>

                            <!-- Calendar Grid -->
                            <div id="calendarGrid" class="calendar-grid">
                                <!-- Preenchido por JavaScript -->
                            </div>

                            <!-- Legend -->
                            <div class="calendar-legend">
                                <div class="legend-item">
                                    <div class="legend-color selected"></div>
                                    <span>Data selecionada</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color available"></div>
                                    <span>Com escalas</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color unavailable"></div>
                                    <span>Sem escalas</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Scales List Section (Right, Main) -->
                    <div class="scales-section">
                        <div id="scalesContainer">
                            <!-- Preenchido por JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>© 2026 | Desenvolvido por <strong>Saulo Eleutério</strong> | Versão 2026.04.26</p>
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
